    <script>
      // DOM Patch V9 - Uniform padding approach: reserve right space for icon in ALL cells
      document.addEventListener('DOMContentLoaded', () => {
          const style = document.createElement('style');
          style.textContent = `
            /* === UNIFORM RIGHT-PADDING on ALL numeric columns (th, td, tfoot) === */
            /* This reserves 16px on the right for the icon zone across ALL rows */
            
            /* Headers */
            .trip-log-table-container thead th:nth-child(n+4) {
              white-space: nowrap !important;
              padding-right: 16px !important;
              text-align: right !important;
            }
            /* First 3 headers stay as-is */
            .trip-log-table-container thead th:nth-child(-n+3) {
              white-space: nowrap !important;
            }

            /* Data cells - ALL numeric columns get uniform padding */
            .trip-log-table-container tbody td:nth-child(n+4) {
              position: relative !important;
              padding-right: 16px !important;
            }

            /* The flex div inside data cells: fill full width, right-align content */
            .trip-log-table-container tbody td > div[style*="flex"] {
              gap: 0px !important;
              width: 100% !important;
              justify-content: flex-end !important;
            }

            /* Number span: takes full width */
            .trip-log-table-container tbody td > div[style*="flex"] > span {
              text-align: right !important;
            }

            /* Icon button: absolute in the reserved 16px right zone */
            .trip-log-table-container tbody td > div[style*="flex"] > button {
              position: absolute !important;
              right: 2px !important;
              top: 50% !important;
              transform: translateY(-50%) !important;
              margin: 0 !important;
              z-index: 2 !important;
            }

            /* Footer/Total row */
            .trip-log-table-container tfoot td:nth-child(n+4) {
              padding-right: 16px !important;
            }

            /* Fullscreen */
            .trip-log-card:fullscreen {
              background: #fff !important;
              overflow: auto !important;
              padding: 20px !important;
            }
          `;
          document.head.appendChild(style);

          setInterval(() => {
              // Fullscreen button
              document.querySelectorAll('.trip-log-card').forEach(card => {
                  if (card.dataset.fsBtn) return;
                  card.dataset.fsBtn = "1";
                  card.style.position = 'relative';
                  const btn = document.createElement('button');
                  btn.textContent = '⛶ ขยายเต็มจอ';
                  btn.style.cssText = 'position:absolute;top:12px;right:15px;z-index:1000;background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:bold;cursor:pointer;';
                  btn.onclick = () => {
                      if (!document.fullscreenElement) {
                          card.requestFullscreen().catch(()=>{});
                          btn.textContent = '✖ ย่อหน้าจอ';
                      } else {
                          document.exitFullscreen();
                      }
                  };
                  card.appendChild(btn);
              });
              if (!document.fullscreenElement) {
                  document.querySelectorAll('button').forEach(btn => {
                      if (btn.textContent.includes('ย่อหน้าจอ')) btn.textContent = '⛶ ขยายเต็มจอ';
                  });
              }

              // Fix negative values
              document.querySelectorAll('.trip-log-table-container tbody tr.table-row-hover').forEach(row => {
                  if (row.dataset.fixedNeg) return;
                  for (let i = 3; i <= 9; i++) {
                      const td = row.cells[i];
                      if (!td) continue;
                      const span = td.querySelector('span');
                      if (span) {
                          let txt = span.textContent.trim();
                          if (txt.startsWith('-') && txt !== '-') {
                              span.textContent = txt.replace(/^-/, '');
                          }
                      }
                  }
                  row.dataset.fixedNeg = "1";
              });
          }, 1200);
      });
    </script>
