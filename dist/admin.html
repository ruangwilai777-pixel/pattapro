        @keyframes pattaPulseGlow {
          0% { 
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2); 
            transform: translateX(-50%) scale(1);
          }
          50% {

            transform: translateX(-50%) translateY(-2px) scale(1.03);

            transform: translateX(-50%) scale(1);
          }
        }

<body>
    <div id="root"></div>
    <script>
        // Force redirect to admin hash if not already there
        if (!window.location.hash.includes('admin')) {
            window.location.hash = '#/admin';
        }

        // Programmatically unregister service workers to prevent aggressive PWA caching in the admin panel
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                if (registrations.length > 0) {
                    for (let registration of registrations) {
                        registration.unregister();
                    }
                    console.log("Service workers unregistered. Reloading to clear cache...");
                    window.location.reload();
                }
            });
        }
    </script>
</body>
