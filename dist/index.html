<!doctype html>
<html lang="th" translate="no">

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" type="image/png" href="/assets/icon-192-cx0PZKN5.png?v=2.1" />
  <link rel="apple-touch-icon" href="/assets/icon-192-cx0PZKN5.png?v=2.1" />
  <link rel="manifest" href="/assets/driver-CfVGt545.webmanifest?v=2.1" />
  <style>
    @media (max-width: 1200px) {

      html,
      body,
      #root {
        height: auto !important;
        overflow: auto !important;
        min-height: 100vh !important;
      }
    }
    
    /* Glassmorphic Sliding Toggle Switch */
    .view-toggle-container {
        display: flex;
        align-items: center;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 0.25rem;
        gap: 0.25rem;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        align-self: center;
    }
    .view-toggle-btn {
        padding: 0.5rem 1rem;
        border: none;
        background: transparent;
        color: var(--text-dim, #94a3b8);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 9px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }
    .view-toggle-btn.active {
        background: linear-gradient(135deg, var(--primary, #8b5cf6) 0%, #6d28d9 100%);
        color: white !important;
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }
    .view-toggle-btn:hover:not(.active) {
        color: white;
        background: rgba(255, 255, 255, 0.05);
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Patta Driver" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>ภัทธา ทรานสปอร์ต แอนด์ โลจิสติกส์</title>
  <script type="module" crossorigin src="/assets/main-gNL91H-p-xz2BRckb.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/main-gNL91H-p-BH__0eCU.css">
</head>

<body>
  <div id="root"></div>
  <script>
      (function() {
          let currentViewMode = 'summary'; // 'daily' or 'summary'
          
          function injectToggleAndSummary() {
              // Find the main MonthlyTable header
              const h3 = Array.from(document.querySelectorAll('h3')).find(el => el.textContent.includes('ตารางรอบสรุปยอด'));
              if (!h3) return;
              
              const glassCard = h3.closest('.glass-card');
              if (!glassCard) return;
              
              const headerDiv = h3.closest('div').parentElement; // div containing title and month selectors
              if (!headerDiv) return;
              
              // 1. Inject Toggle Switch if not present
              let toggleContainer = headerDiv.querySelector('.view-toggle-container');
              if (!toggleContainer) {
                  toggleContainer = document.createElement('div');
                  toggleContainer.className = 'view-toggle-container animate-fade-in';
                  toggleContainer.style.marginLeft = '1rem';
                  toggleContainer.innerHTML = `
                      <button class="view-toggle-btn ${currentViewMode === 'daily' ? 'active' : ''}" id="toggle-daily-btn">
                          <span>ตารางรายวัน</span>
                      </button>
                      <button class="view-toggle-btn ${currentViewMode === 'summary' ? 'active' : ''}" id="toggle-summary-btn">
                          <span>สรุปยอดคนขับ</span>
                      </button>
                  `;
                  
                  // Insert after the month navigation selectors
                  const navSelector = headerDiv.querySelector('div[style*="background: rgba"]');
                  if (navSelector) {
                      navSelector.parentNode.insertBefore(toggleContainer, navSelector.nextSibling);
                  } else {
                      headerDiv.appendChild(toggleContainer);
                  }
                  
                  // Attach toggle click events
                  const dailyBtn = toggleContainer.querySelector('#toggle-daily-btn');
                  const summaryBtn = toggleContainer.querySelector('#toggle-summary-btn');
                  
                  dailyBtn.addEventListener('click', () => {
                      currentViewMode = 'daily';
                      dailyBtn.classList.add('active');
                      summaryBtn.classList.remove('active');
                      updateVisibility();
                  });
                  
                  summaryBtn.addEventListener('click', () => {
                      currentViewMode = 'summary';
                      summaryBtn.classList.add('active');
                      dailyBtn.classList.remove('active');
                      updateVisibility();
                  });
              }
              
              // 2. Intercept Export Button
              const exportBtn = glassCard.querySelector('.btn-outline');
              if (exportBtn && !exportBtn.dataset.captured) {
                  exportBtn.dataset.captured = 'true';
                  exportBtn.addEventListener('click', (e) => {
                      if (currentViewMode === 'summary') {
                          e.stopImmediatePropagation();
                          e.preventDefault();
                          exportSummary();
                      }
                  }, true);
              }
              
              // 3. Ensure Summary Table Container exists
              const tableContainer = glassCard.querySelector('.table-container');
              if (!tableContainer) return;
              
              let summaryContainer = glassCard.querySelector('.summary-table-container');
              if (!summaryContainer) {
                  summaryContainer = document.createElement('div');
                  summaryContainer.className = 'summary-table-container table-container'; // Reuse table-container for scrolling & styling
                  summaryContainer.style.display = 'none';
                  tableContainer.parentNode.insertBefore(summaryContainer, tableContainer.nextSibling);
              }
              
              // 4. Update visibility and regenerate summary
              updateVisibility();
          }
          
          function parseVal(cell) {
              if (!cell) return 0;
              const badge = cell.querySelector('.badge');
              const text = badge ? badge.textContent : cell.textContent;
              const cleaned = text.replace(/[^\d.-]/g, '');
              return parseFloat(cleaned) || 0;
          }
          
          function updateVisibility() {
              const h3 = Array.from(document.querySelectorAll('h3')).find(el => el.textContent.includes('ตารางรอบสรุปยอด'));
              if (!h3) return;
              const glassCard = h3.closest('.glass-card');
              if (!glassCard) return;
              
              const tableContainer = glassCard.querySelector('.table-container:not(.summary-table-container)');
              const summaryContainer = glassCard.querySelector('.summary-table-container');
              if (!tableContainer || !summaryContainer) return;
              
              if (currentViewMode === 'daily') {
                  tableContainer.style.setProperty('display', 'block', 'important');
                  summaryContainer.style.setProperty('display', 'none', 'important');
              } else {
                  tableContainer.style.setProperty('display', 'none', 'important');
                  summaryContainer.style.setProperty('display', 'block', 'important');
                  generateSummary(tableContainer, summaryContainer);
              }
          }
          
          function generateSummary(tableContainer, summaryContainer) {
              const drivers = {};
              const rows = Array.from(tableContainer.querySelectorAll('tbody tr'));
              
              for (const row of rows) {
                  if (row.cells.length < 12) continue; // Skip headers, empty state, footers
                  const driverName = row.cells[1].textContent.trim();
                  if (!driverName || driverName === '-' || driverName === 'ไม่ระบุชื่อ') continue;
                  
                  if (!drivers[driverName]) {
                      drivers[driverName] = {
                          name: driverName,
                          trips: 0,
                          price: 0,
                          fuel: 0,
                          wage: 0,
                          maintenance: 0,
                          basket: 0,
                          basketShare: 0,
                          advance: 0,
                          profit: 0
                      };
                  }
                  
                  const d = drivers[driverName];
                  d.trips += 1;
                  d.price += parseVal(row.cells[3]);
                  d.fuel += parseVal(row.cells[4]);
                  d.wage += parseVal(row.cells[5]);
                  d.maintenance += parseVal(row.cells[6]);
                  d.basket += parseVal(row.cells[7]);
                  d.basketShare += parseVal(row.cells[8]);
                  d.advance += parseVal(row.cells[9]);
                  d.profit += parseVal(row.cells[10]);
              }
              
              // Calculate Totals
              const totals = {
                  trips: 0,
                  price: 0,
                  fuel: 0,
                  wage: 0,
                  maintenance: 0,
                  basket: 0,
                  basketShare: 0,
                  advance: 0,
                  profit: 0
              };
              
              let rowsHtml = '';
              const driverList = Object.values(drivers);
              
              for (const d of driverList) {
                  totals.trips += d.trips;
                  totals.price += d.price;
                  totals.fuel += d.fuel;
                  totals.wage += d.wage;
                  totals.maintenance += d.maintenance;
                  totals.basket += d.basket;
                  totals.basketShare += d.basketShare;
                  totals.advance += d.advance;
                  totals.profit += d.profit;
                  
                  const profitBadgeClass = d.profit >= 0 ? 'badge-profit' : 'badge-loss';
                  rowsHtml += `
                      <tr class="trip-row-hover">
                          <td style="padding: 0.75rem 0.5rem; color: var(--primary); font-weight: 600; text-align: left;">${d.name}</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: center; color: white;">${d.trips} เที่ยว</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: right; color: white;">${d.price > 0 ? d.price.toLocaleString() : '-'}</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--danger);">${d.fuel > 0 ? d.fuel.toLocaleString() : '-'}</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--danger);">${d.wage > 0 ? d.wage.toLocaleString() : '-'}</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--danger);">${d.maintenance > 0 ? d.maintenance.toLocaleString() : '-'}</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--safe);">${d.basket > 0 ? d.basket.toLocaleString() : '-'}</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--danger);">${d.basketShare > 0 ? d.basketShare.toLocaleString() : '-'}</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--warning);">${d.advance > 0 ? d.advance.toLocaleString() : '-'}</td>
                          <td style="padding: 0.75rem 0.5rem; text-align: center;">
                              <span class="badge ${profitBadgeClass}" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; float: none; display: inline-block; min-width: 70px;">
                                  ${Math.round(d.profit).toLocaleString()}
                              </span>
                          </td>
                      </tr>
                  `;
              }
              
              if (driverList.length === 0) {
                  rowsHtml = `
                      <tr>
                          <td colSpan="10" style="text-align: center; padding: 2rem; color: var(--text-dim); opacity: 0.4; font-size: 0.8rem;">
                              ไม่มีรายชื่อวิ่งงานสำหรับรอบบิลนี้
                          </td>
                      </tr>
                  `;
              }
              
              const totalsHtml = `
                  <tr style="font-weight: 800;">
                      <td style="padding: 0.75rem 0.5rem; color: var(--primary); text-align: left; font-family: 'Chakra Petch', sans-serif; font-size: 0.9rem;">
                          <div>รวมสรุป</div>
                          <div style="font-size: 0.7rem; color: white; opacity: 0.8;">(${totals.trips} เที่ยว)</div>
                      </td>
                      <td></td>
                      <td style="padding: 0.75rem 0.5rem; text-align: right; color: white;">
                          <div style="font-size: 0.6rem; opacity: 0.6; margin-bottom: -2px;">รวมค่าเที่ยว</div>
                          ฿${totals.price.toLocaleString()}
                      </td>
                      <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--danger);">
                          <div style="font-size: 0.6rem; opacity: 0.6; margin-bottom: -2px;">น้ำมัน</div>
                          ฿${totals.fuel.toLocaleString()}
                      </td>
                      <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--danger);">
                          <div style="font-size: 0.6rem; opacity: 0.6; margin-bottom: -2px;">ค่าแรง</div>
                          ฿${totals.wage.toLocaleString()}
                      </td>
                      <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--danger);">
                          <div style="font-size: 0.6rem; opacity: 0.6; margin-bottom: -2px;">ซ่อม</div>
                          ฿${totals.maintenance.toLocaleString()}
                      </td>
                      <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--safe);">
                          <div style="font-size: 0.6rem; opacity: 0.6; margin-bottom: -2px;">รวมตะกร้า</div>
                          ฿${totals.basket.toLocaleString()}
                      </td>
                      <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--danger);">
                          <div style="font-size: 0.6rem; opacity: 0.6; margin-bottom: -2px;">แบ่ง</div>
                          ฿${totals.basketShare.toLocaleString()}
                      </td>
                      <td style="padding: 0.75rem 0.5rem; text-align: right; color: var(--warning);">
                          <div style="font-size: 0.6rem; opacity: 0.6; margin-bottom: -2px;">เบิก</div>
                          ฿${totals.advance.toLocaleString()}
                      </td>
                      <td style="padding: 0.5rem 0;">
                          <div style="font-size: 0.6rem; opacity: 0.6; margin-bottom: 2px; text-align: center;">กำไรสุทธิ</div>
                          <div class="badge ${totals.profit >= 0 ? 'badge-profit' : 'badge-loss'}" style="font-size: 0.85rem; width: 90%; margin: 0 auto; display: flex; justify-content: center;">
                              ฿${Math.round(totals.profit).toLocaleString()}
                          </div>
                      </td>
                  </tr>
              `;
              
              summaryContainer.innerHTML = `
                  <table style="min-width: 1000px;">
                      <thead style="position: sticky; top: 0; z-index: 1000; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.1);">
                          <tr>
                              <th style="width: 15%; padding: 0.5rem; text-align: left;">คนขับ</th>
                              <th style="width: 10%; padding: 0.5rem; text-align: center;">จำนวนเที่ยว</th>
                              <th style="width: 10%; padding: 0.5rem; text-align: right;">ราคา</th>
                              <th style="width: 9%; padding: 0.5rem; text-align: right;">น้ำมัน</th>
                              <th style="width: 9%; padding: 0.5rem; text-align: right;">ค่าจ้าง</th>
                              <th style="width: 9%; padding: 0.5rem; text-align: right;">ค่าซ่อม</th>
                              <th style="width: 9%; padding: 0.5rem; text-align: right;">ตะกร้า</th>
                              <th style="width: 9%; padding: 0.5rem; text-align: right;">แบ่ง</th>
                              <th style="width: 9%; padding: 0.5rem; text-align: right;">เบิก</th>
                              <th style="width: 11%; padding: 0.5rem; text-align: center;">กำไรสุทธิ</th>
                          </tr>
                      </thead>
                      <tbody style="font-size: 0.8rem;">
                          ${rowsHtml}
                      </tbody>
                      <tfoot style="position: sticky; bottom: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-top: 2px solid var(--primary-glow); z-index: 20;">
                          ${totalsHtml}
                      </tfoot>
                  </table>
              `;
          }
          
          function exportSummary() {
              const h3 = Array.from(document.querySelectorAll('h3')).find(el => el.textContent.includes('ตารางรอบสรุปยอด'));
              if (!h3) return;
              const glassCard = h3.closest('.glass-card');
              const tableContainer = glassCard.querySelector('.table-container:not(.summary-table-container)');
              if (!tableContainer) return;
              
              // Scraping data to export
              const drivers = {};
              const rows = Array.from(tableContainer.querySelectorAll('tbody tr'));
              
              for (const row of rows) {
                  if (row.cells.length < 12) continue;
                  const driverName = row.cells[1].textContent.trim();
                  if (!driverName || driverName === '-' || driverName === 'ไม่ระบุชื่อ') continue;
                  
                  if (!drivers[driverName]) {
                      drivers[driverName] = {
                          name: driverName,
                          trips: 0,
                          price: 0,
                          fuel: 0,
                          wage: 0,
                          maintenance: 0,
                          basket: 0,
                          basketShare: 0,
                          advance: 0,
                          profit: 0
                      };
                  }
                  
                  const d = drivers[driverName];
                  d.trips += 1;
                  d.price += parseVal(row.cells[3]);
                  d.fuel += parseVal(row.cells[4]);
                  d.wage += parseVal(row.cells[5]);
                  d.maintenance += parseVal(row.cells[6]);
                  d.basket += parseVal(row.cells[7]);
                  d.basketShare += parseVal(row.cells[8]);
                  d.advance += parseVal(row.cells[9]);
                  d.profit += parseVal(row.cells[10]);
              }
              
              const totals = {
                  trips: 0,
                  price: 0,
                  fuel: 0,
                  wage: 0,
                  maintenance: 0,
                  basket: 0,
                  basketShare: 0,
                  advance: 0,
                  profit: 0
              };
              
              const headers = ["คนขับ", "จำนวนวิ่ง", "รวมค่าเที่ยว", "น้ำมัน", "ค่าจ้าง", "ค่าซ่อม", "รวมตะกร้า", "แบ่งตะกร้า", "ยอดเบิก", "กำไรสุทธิ"];
              const exportRows = [];
              
              for (const d of Object.values(drivers)) {
                  totals.trips += d.trips;
                  totals.price += d.price;
                  totals.fuel += d.fuel;
                  totals.wage += d.wage;
                  totals.maintenance += d.maintenance;
                  totals.basket += d.basket;
                  totals.basketShare += d.basketShare;
                  totals.advance += d.advance;
                  totals.profit += d.profit;
                  
                  exportRows.push([
                      `"${d.name}"`,
                      d.trips,
                      d.price,
                      d.fuel,
                      d.wage,
                      d.maintenance,
                      d.basket,
                      d.basketShare,
                      d.advance,
                      d.profit
                  ]);
              }
              
              exportRows.push([
                  `"รวมสรุปทั้งหมด"`,
                  totals.trips,
                  totals.price,
                  totals.fuel,
                  totals.wage,
                  totals.maintenance,
                  totals.basket,
                  totals.basketShare,
                  totals.advance,
                  totals.profit
              ]);
              
              const csvContent = [
                  headers.join(","),
                  ...exportRows.map(r => r.join(","))
              ].join("\n");
              
              const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");
              link.setAttribute("href", url);
              
              const titleEl = Array.from(document.querySelectorAll('h3')).find(el => el.textContent.includes('ตารางรอบสรุปยอด'));
              const monthText = titleEl ? titleEl.nextElementSibling.textContent.trim() : 'summary';
              
              link.setAttribute("download", `driver_summary_${monthText.replace(/[\s\:\-]+/g, '_')}.csv`);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
          }
          
          // Set up MutationObserver to dynamically watch the page
          const observer = new MutationObserver((mutations) => {
              if (window.location.hash.includes('admin')) {
                  injectToggleAndSummary();
              }
          });
          
          observer.observe(document.body, {
              childList: true,
              subtree: true
          });
          
          // Run initially as well
          setTimeout(injectToggleAndSummary, 1000);
      })();
  </script>
</body>

</html>
