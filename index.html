  <style>
    @media (max-width: 1200px) {

      html,
      body,
      #root {
        height: auto !important;
        overflow: auto !important;
        min-height: 100vh !important;
      }
    }
    
    /* Restore and compact the basket details container to fit perfectly inside the frame */
    .basket-detail-glass {
      display: block !important;
      background: rgba(255, 255, 255, 0.95) !important;
      border: 1px dashed rgba(79, 70, 229, 0.3) !important;
      border-radius: 12px !important;
      padding: 8px !important;
      margin-top: 6px !important;
      box-sizing: border-box !important;
      width: 100% !important;
      max-width: 100% !important;
      overflow: hidden !important;
    }
    /* Force internal grid to use minmax(0, 1fr) to prevent horizontal blowout */
    .basket-detail-glass > div:first-child {
      display: grid !important;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important;
      gap: 6px !important;
      width: 100% !important;
      margin-bottom: 8px !important;
    }
    .basket-detail-glass > div:first-child > div {
      min-width: 0 !important;
      width: 100% !important;
    }
    /* Compact label fonts and prevent wrapping blowout */
    .basket-detail-glass label {
      font-size: 8.5px !important;
      font-weight: 700 !important;
      color: #475569 !important;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      display: block !important;
      margin-bottom: 2px !important;
      text-transform: none !important;
    }
    /* Shrink input fields to stay inside column */
    .basket-detail-glass input.input-premium-compact {
      height: 30px !important;
      padding: 2px 6px !important;
      font-size: 0.75rem !important;
      border-radius: 6px !important;
      border: 1px solid #cbd5e1 !important;
      background: #fff !important;
      color: #1e40af !important;
      min-width: 0 !important;
      width: 100% !important;
      box-sizing: border-box !important;
    }
    /* Compact calculation summary lines */
    .basket-calc-summary {
      margin-top: 6px !important;
    }
    .basket-calc-summary .calc-row {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      padding: 4px 0 !important;
      border-bottom: 1px dashed #e2e8f0 !important;
      font-size: 0.75rem !important;
      color: #475569 !important;
    }
    .basket-calc-summary .calc-row:last-child {
      border-bottom: none !important;
    }
    .basket-calc-summary .calc-value {
      font-weight: 700 !important;
      color: #1e40af !important;
    }
    .basket-calc-summary .calc-row.highlight .calc-value {
      color: #059669 !important;
    }
    /* Hide the edit hover buttons in the log table */
    .edit-hover-btn {
      display: none !important;
    }
    /* Hide the truck plate number line (or the small '-' under the name) in the old admin summary table */
    .admin-summary-table tbody td:first-child div:nth-child(2) {
      display: none !important;
    }
    /* Hide the 'กำไร' (Profit) column (7th column) from the summary table */
    .admin-summary-table th:nth-child(7),
    .admin-summary-table td:nth-child(7) {
      display: none !important;
    }
    
    @keyframes pattaPulseGlow {
      0% { 
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2); 
        transform: translateX(-50%) scale(1);
      }
      50% { 
        box-shadow: 0 12px 36px rgba(99, 102, 241, 0.75), 0 0 20px rgba(99, 102, 241, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25); 
        transform: translateX(-50%) translateY(-2px) scale(1.03); 
      }
      100% { 
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2); 
        transform: translateX(-50%) scale(1);
      }
    }
    .patta-glow-btn {
      animation: pattaPulseGlow 3s infinite ease-in-out;
    }
    .patta-glow-btn:hover {
      animation: none !important;
    }

    /* Mobile responsive vertical stacking to prevent edit modal grid blowout in old admin panel */
    @media (max-width: 768px) {
      body .admin-trip-form-card .admin-form-grid-3,
      body .admin-trip-form-card .admin-form-grid,
      body .admin-trip-form-card .admin-form-grid-2 {
        display: flex !important;
        flex-direction: column !important;
        gap: 12px !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
      body .admin-trip-form-card .grid-column-v,
      body .admin-trip-form-card .grid-column {
        width: 100% !important;
        min-width: 0 !important;
        flex: 1 1 auto !important;
        box-sizing: border-box !important;
      }
      body .admin-trip-form-card .input-field-premium {
        width: 100% !important;
        min-width: 0 !important;
        box-sizing: border-box !important;
      }
      body .admin-trip-form-card input.input-premium-compact,
      body .admin-trip-form-card input.input-premium-ultra-compact,
      body .admin-trip-form-card input {
        width: 100% !important;
        min-width: 0 !important;
        box-sizing: border-box !important;
      }
      /* Ensure basket details grid is bulletproof on mobile */
      body .admin-trip-form-card .basket-detail-glass > div:first-child {
        display: flex !important;
        gap: 8px !important;
        width: 100% !important;
        box-sizing: border-box !important;
      }
      body .admin-trip-form-card .basket-detail-glass > div:first-child > div {
        flex: 1 !important;
        min-width: 0 !important;
        box-sizing: border-box !important;
      }
      /* Squeeze spacing for compact touch targets on mobile */
      body .admin-trip-form-card {
        padding: 10px !important;
        margin: 0 !important;
        border-radius: 12px !important;
      }
    }
  </style>

        }
      };

      };
    }

<body>
  <div id="root"></div>
  <script>
    // Monitor URL hash to inject a floating Switch Button on the old admin page
    (function() {
      var btn = null;
      function checkHash() {
        var isOldAdmin = window.location.hash.includes('admin');
        if (isOldAdmin) {
          if (!btn) {
            btn = document.createElement('div');
            btn.className = 'patta-glow-btn';
            btn.style.cssText = 'position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 4px; gap: 4px; display: flex; align-items: center; z-index: 999999; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);';
            
            btn.innerHTML = `
              <div style="background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; border-radius: 12px; padding: 6px 14px; font-size: 12.5px; font-weight: 800; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35); cursor: default; white-space: nowrap; height: 28px; box-sizing: border-box; line-height: 1;">
                🟣 กำลังใช้งานเวอร์ชันเก่า
              </div>
              <a href="/admin" style="background: rgba(16, 185, 129, 0.06); border: 1px solid rgba(16, 185, 129, 0.2); color: #34d399; border-radius: 12px; padding: 6px 14px; font-size: 12.5px; font-weight: 800; text-decoration: none; display: flex; align-items: center; gap: 5px; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; height: 28px; box-sizing: border-box; line-height: 1;" 
                 onmouseenter="this.style.background='rgba(16, 185, 129, 0.15)'; this.style.borderColor='rgba(16, 185, 129, 0.4)';" 
                 onmouseleave="this.style.background='rgba(16, 185, 129, 0.06)'; this.style.borderColor='rgba(16, 185, 129, 0.2)';">
                🔄 กลับไปเวอร์ชันใหม่
              </a>
            `;
            
            btn.onmouseenter = function() {
              btn.style.transform = 'translateX(-50%) translateY(-3px) scale(1.05)';
              btn.style.boxShadow = '0 12px 36px rgba(0, 0, 0, 0.6)';
            };
            btn.onmouseleave = function() {
              btn.style.transform = 'translateX(-50%)';
              btn.style.boxShadow = '0 10px 30px rgba(0, 0, 0, 0.5)';
            };
            document.body.appendChild(btn);
          }
        } else {
          if (btn) {
            btn.remove();
            btn = null;
          }
        }
      }
      window.addEventListener('load', checkHash);
      window.addEventListener('hashchange', checkHash);
      setInterval(checkHash, 1000);
    })();
  </script>
